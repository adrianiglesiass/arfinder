name: Backend Deploy (staging)

on:
  push:
    branches: [develop]
    paths:
      - 'backend/**'
      - '.github/workflows/backend-deploy-staging.yml'

concurrency:
  group: deploy-backend-staging
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4
      - uses: superfly/flyctl-actions/setup-flyctl@master
      - name: Deploy to Fly (staging)
        run: flyctl deploy --remote-only --config fly.staging.toml --app arfinder-api-staging
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN_STAGING }}
