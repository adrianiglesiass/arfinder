name: Frontend Deploy (production)

on:
  push:
    branches: [main]
    paths:
      - 'frontend/**'
      - '.github/workflows/frontend-deploy-prod.yml'

concurrency:
  group: deploy-frontend-prod
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment: production
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json
      - run: npm ci
      - name: Build (production)
        run: npx ng build --configuration production
      - name: Install InsForge CLI
        run: npm install -g @insforge/cli
      - name: Authenticate
        run: insforge login --user-api-key "$INSFORGE_USER_API_KEY"
        env:
          INSFORGE_USER_API_KEY: ${{ secrets.INSFORGE_USER_API_KEY }}
      - name: Link production project
        run: insforge link --project-id "$PROJECT_ID" --org-id "$ORG_ID"
        env:
          PROJECT_ID: ${{ secrets.INSFORGE_PROD_PROJECT_ID }}
          ORG_ID: ${{ secrets.INSFORGE_ORG_ID }}
      - name: Deploy
        run: insforge deployments deploy dist/arfinder-frontend/browser -y
