version: '3.8'

services:
  db:
    image: postgres:15-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: root
      POSTGRES_PASSWORD: root1234
      POSTGRES_DB: arfinder_db
    volumes:
      - db_data:/var/lib/postgresql/data
    ports:
      - '5432:5432'
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U root -d arfinder_db"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  db-test:
    image: postgres:15-alpine
    restart: 'no'
    environment:
      POSTGRES_USER: root
      POSTGRES_PASSWORD: root1234
      POSTGRES_DB: arfinder_test_db
    tmpfs:
      - /var/lib/postgresql/data
    ports:
      - '5433:5432'

volumes:
  db_data:
