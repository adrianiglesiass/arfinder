version: '3.8'

services:
  db:
    image: mysql:8.0
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: root1234
      MYSQL_DATABASE: arfinder_db
    volumes:
      - db_data:/var/lib/mysql
    ports:
      - '3306:3306'
    healthcheck:
      test: ['CMD', 'mysqladmin', 'ping', '-h', 'localhost']
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

  db-test:
    image: mysql:8.0
    restart: 'no'
    environment:
      MYSQL_ROOT_PASSWORD: root1234
      MYSQL_DATABASE: arfinder_test_db
    tmpfs:
      - /var/lib/mysql
    ports:
      - '3307:3306'

volumes:
  db_data:
