<app-auth-card [activeTab]="mode()">
  <form [formGroup]="form" (ngSubmit)="onSubmit()" class="flex flex-col gap-5">
    <div class="flex flex-col gap-1.5">
      <label
        for="auth-email"
        class="block text-xs font-semibold text-gray-500 uppercase tracking-wider"
        >Email</label
      >
      <input
        id="auth-email"
        pInputText
        type="email"
        placeholder="ejemplo@arfinder.com"
        formControlName="email"
        [invalid]="isInvalid('email')"
        class="w-full rounded-xl"
      />
      <app-field-error [control]="form.get('email')!" />
    </div>

    <div class="flex flex-col gap-1.5">
      <label
        for="auth-password"
        class="block text-xs font-semibold text-gray-500 uppercase tracking-wider"
        >Contraseña</label
      >
      <p-password
        inputId="auth-password"
        formControlName="password"
        placeholder="••••••••"
        [toggleMask]="true"
        [feedback]="isRegisterMode()"
        [fluid]="true"
        [invalid]="isInvalid('password')"
      />
      <app-field-error [control]="form.get('password')!" />
    </div>

    @if (isRegisterMode()) {
      <div class="flex flex-col gap-1.5 animate-fade-in">
        <label
          for="confirm-password"
          class="block text-xs font-semibold text-gray-500 uppercase tracking-wider"
          >Confirmar contraseña</label
        >
        <input
          id="confirm-password"
          pInputText
          type="password"
          placeholder="••••••••"
          formControlName="confirmPassword"
          [invalid]="isPasswordMismatch()"
          class="w-full rounded-xl"
        />
        @if (isPasswordMismatch()) {
          <small class="text-red-500 text-xs mt-1">Las contraseñas no coinciden.</small>
        }
      </div>
    }

    @if (errorMessage()) {
      <p-message severity="error" size="small" variant="simple">
        {{ errorMessage() }}
      </p-message>
    }

    <app-button type="submit" [loading]="isLoading()" class="w-full mt-1">
      {{ submitLabel() }}
    </app-button>

    <div class="relative py-2">
      <p-divider align="center"></p-divider>
    </div>

    <app-button variant="secondary" [loading]="isLoading()" (click)="onSocialAuth()" class="w-full">
      <div class="w-6 h-6 flex items-center justify-center shrink-0">
        <img src="/assets/icons/google-logo.svg" alt="Google" class="w-5 h-5 object-contain" />
      </div>
      <span>Continúa con Google</span>
    </app-button>

    <app-button
      variant="secondary"
      [loading]="isLoading()"
      (click)="onSocialAuthApple()"
      class="w-full"
    >
      <div class="w-6 h-6 flex items-center justify-center shrink-0">
        <svg class="w-5 h-5" viewBox="0 0 24 24" fill="currentColor">
          <path
            d="M18.71 19.5c-.83 1.24-1.71 2.45-3.05 2.47-1.34.03-1.77-.79-3.29-.79-1.53 0-2 .77-3.27.82-1.31.05-2.3-1.32-3.14-2.53C4.25 17 2.94 12.45 4.7 9.39c.87-1.52 2.43-2.48 4.12-2.51 1.28-.02 2.5.87 3.29.87.78 0 2.26-1.07 3.81-.91.65.03 2.47.26 3.64 1.98-.09.06-2.17 1.28-2.15 3.81.03 3.02 2.65 4.03 2.68 4.04-.03.07-.42 1.44-1.38 2.83M13 3.5c.73-.83 1.94-1.46 2.94-1.5.13 1.17-.34 2.35-1.04 3.19-.69.85-1.83 1.51-2.95 1.42-.15-1.15.41-2.35 1.05-3.11z"
          />
        </svg>
      </div>
      <span>Continúa con Apple</span>
    </app-button>
  </form>
</app-auth-card>
