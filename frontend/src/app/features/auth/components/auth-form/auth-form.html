<app-auth-card [activeTab]="mode()">
  <form [formGroup]="form" (ngSubmit)="onSubmit()" class="flex flex-col gap-5">
    <div class="flex flex-col gap-1.5">
      <label
        for="auth-email"
        class="block text-xs font-semibold text-gray-500 uppercase tracking-wider"
        >Email</label
      >
      <input
        id="auth-email"
        pInputText
        type="email"
        placeholder="ejemplo@arfinder.com"
        formControlName="email"
        [invalid]="isInvalid('email')"
        class="w-full rounded-xl!"
      />
      <app-field-error [control]="form.get('email')!" />
    </div>

    <div class="flex flex-col gap-1.5">
      <label
        for="auth-password"
        class="block text-xs font-semibold text-gray-500 uppercase tracking-wider"
        >Contraseña</label
      >
      <p-password
        inputId="auth-password"
        formControlName="password"
        placeholder="••••••••"
        [toggleMask]="true"
        [feedback]="mode() === 'register'"
        [fluid]="true"
        [invalid]="isInvalid('password')"
      />
      <app-field-error [control]="form.get('password')!" />
    </div>

    @if (mode() === 'register') {
      <div class="flex flex-col gap-1.5 animate-fade-in">
        <label
          for="confirm-password"
          class="block text-xs font-semibold text-gray-500 uppercase tracking-wider"
          >Confirmar contraseña</label
        >
        <input
          id="confirm-password"
          pInputText
          type="password"
          placeholder="••••••••"
          formControlName="confirmPassword"
          [invalid]="isPasswordMismatch()"
          class="w-full rounded-xl!"
        />
        @if (isPasswordMismatch()) {
          <small class="text-red-500 text-xs mt-1">Las contraseñas no coinciden.</small>
        }
      </div>
    }

    @if (errorMessage()) {
      <p-message severity="error" size="small" variant="simple">
        {{ errorMessage() }}
      </p-message>
    }

    <app-auth-submit-button
      [loading]="isLoading()"
      [label]="mode() === 'login' ? 'Iniciar sesión' : 'Registrarse'"
      [buttonClass]="
        mode() === 'login'
          ? 'w-full py-3.5 rounded-2xl! font-medium text-sm mt-1 active:scale-95'
          : 'w-full py-4 rounded-2xl! font-semibold text-base mt-2 active:scale-95 transition-all'
      "
    />

    <div class="relative py-2">
      <p-divider align="center"></p-divider>
    </div>

    <app-auth-social-button
      [loading]="isLoading()"
      (action)="onSocialAuth()"
      label="Continúa con Google"
    />
  </form>
</app-auth-card>
