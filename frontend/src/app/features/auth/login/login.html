<app-auth-card [activeTab]="'login'">
  <form [formGroup]="form" (ngSubmit)="onSubmit()" class="flex flex-col gap-5">
    <div class="flex flex-col gap-1.5">
      <label
        for="login-email"
        class="block text-xs font-semibold text-gray-500 uppercase tracking-wider"
        >Email</label
      >
      <input
        id="login-email"
        pInputText
        type="email"
        placeholder="ejemplo@arfinder.com"
        formControlName="email"
        [invalid]="isInvalid('email')"
        class="w-full rounded-xl!"
      />
      <app-field-error [control]="form.get('email')!" />
    </div>

    <div class="flex flex-col gap-1.5">
      <label
        for="login-password"
        class="block text-xs font-semibold text-gray-500 uppercase tracking-wider"
        >Contraseña</label
      >
      <p-password
        inputId="login-password"
        formControlName="password"
        placeholder="••••••••"
        [toggleMask]="true"
        [feedback]="false"
        [fluid]="true"
        [invalid]="isInvalid('password')"
      />
      <app-field-error [control]="form.get('password')!" />
    </div>

    @if (errorMessage()) {
      <p-message severity="error" size="small" variant="simple">{{ errorMessage() }}</p-message>
    }

    <button
      pButton
      type="submit"
      [loading]="isLoading()"
      class="w-full py-3.5 rounded-2xl! font-medium text-sm mt-1 active:scale-95"
    >
      Iniciar sesión
    </button>

    <div class="relative py-2">
      <p-divider align="center">
        <span class="text-xs text-gray-400 font-medium uppercase tracking-widest px-2"
          >O continúa con</span
        >
      </p-divider>
    </div>

    <button
      pButton
      type="button"
      [loading]="isLoading()"
      (click)="onLoginWithGoogle()"
      class="w-full py-3.5 rounded-2xl! font-medium text-sm border-gray-200! text-gray-700! bg-white! hover:bg-gray-50! active:scale-95 transition-all"
    >
      <div class="flex items-center justify-center gap-0.5">
        <i class="pi pi-google"></i>
        <span>oogle</span>
      </div>
    </button>
  </form>
</app-auth-card>
