<app-auth-card activeTab="verify">
  <form [formGroup]="form" (ngSubmit)="onSubmit()" class="flex flex-col gap-6">
    <div class="flex justify-between gap-2" (paste)="onPaste($event)">
      @for (control of otpArray.controls; track $index) {
        <input
          #otpInput
          type="text"
          inputmode="numeric"
          maxlength="1"
          [formControl]="$any(control)"
          (input)="onInput($event, $index)"
          (keydown)="onKeyDown($event, $index)"
          class="w-12 h-14 text-center text-2xl font-bold bg-gray-50 border border-gray-border rounded-xl focus:bg-white focus:border-primary focus:ring-4 focus:ring-primary/10 transition-all outline-none"
          [class.border-red-400]="errorMessage()"
        />
      }
    </div>

    @if (errorMessage()) {
      <p-message severity="error" styleClass="w-full">{{ errorMessage() }}</p-message>
    }

    <div class="flex flex-col gap-3">
      <p-button
        type="submit"
        label="Verificar Código"
        [loading]="isLoading()"
        [disabled]="form.invalid"
        styleClass="w-full py-4 rounded-xl text-lg font-semibold"
      />

      <div class="text-center mt-4">
        <p class="text-sm text-gray-500 mb-2">¿No recibiste el código?</p>
        <p-button
          [label]="resendLabel()"
          variant="text"
          [loading]="resendLoading()"
          [disabled]="resendDisabled()"
          (onClick)="onResend()"
          styleClass="text-primary font-semibold p-0"
        />
      </div>
    </div>
  </form>
</app-auth-card>
