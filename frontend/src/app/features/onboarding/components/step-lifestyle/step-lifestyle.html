<div class="animate-fade-in">
  <h2 class="text-3xl font-serif text-primary mb-2">Estilo de convivencia</h2>

  <div class="space-y-8">
    <div role="group" aria-labelledby="schedule-label">
      <span
        id="schedule-label"
        class="block text-xs font-semibold text-gray-500 uppercase tracking-wider mb-4"
      >
        Horario Habitual
      </span>

      <div class="flex flex-wrap gap-3">
        @for (s of schedules; track s.value) {
          <button
            type="button"
            (click)="setSchedule(s.value)"
            [class]="
              schedule() === s.value
                ? 'bg-primary text-white border-primary'
                : 'bg-white text-gray-700 border-gray-200 hover:border-primary'
            "
            class="px-5 py-2.5 rounded-full border text-sm font-medium transition-all duration-200 cursor-pointer"
          >
            {{ s.label }}
          </button>
        }
      </div>
    </div>

    <div class="bg-gray-50 rounded-3xl p-6 space-y-6">
      <div class="flex items-center justify-between">
        <label for="hasPetsToggle" class="flex items-center gap-3 cursor-pointer">
          <div
            class="w-10 h-10 bg-white rounded-xl shadow-sm flex items-center justify-center text-gray-400"
          >
            <i class="pi pi-heart-fill"></i>
          </div>
          <div>
            <div class="font-medium text-primary text-sm">Mascotas</div>
            <div class="text-xs text-gray-500">Tengo o acepto mascotas</div>
          </div>
        </label>
        <p-toggleswitch
          inputId="hasPetsToggle"
          [ngModel]="hasPets()"
          (ngModelChange)="updateToggle('has_pets', $event)"
        />
      </div>

      <div class="h-px bg-gray-200 w-full"></div>

      <div class="flex items-center justify-between">
        <label for="isSmokerToggle" class="flex items-center gap-3 cursor-pointer">
          <div
            class="w-10 h-10 bg-white rounded-xl shadow-sm flex items-center justify-center text-gray-400"
          >
            <i class="pi pi-stop-circle"></i>
          </div>
          <div>
            <div class="font-medium text-primary text-sm">Fumador</div>
            <div class="text-xs text-gray-500">Fumo habitualmente</div>
          </div>
        </label>
        <p-toggleswitch
          inputId="isSmokerToggle"
          [ngModel]="isSmoker()"
          (ngModelChange)="updateToggle('is_smoker', $event)"
        />
      </div>
    </div>
  </div>
</div>
