<div class="animate-in fade-in slide-in-from-right-4 duration-300">
  <h2 class="text-3xl font-serif text-primary mb-2">¿Cuál es tu objetivo?</h2>
  <p class="text-gray-500 mb-8">Selecciona qué estás buscando en Arfinder.</p>

  <div class="grid grid-cols-1 md:grid-cols-2 gap-4 mb-8">
    <div
      role="button"
      tabindex="0"
      (click)="setType('looking_for_flat')"
      (keydown.enter)="setType('looking_for_flat')"
      (keydown.space)="setType('looking_for_flat')"
      [class]="cardClasses(type() === 'looking_for_flat')"
      class="relative p-6 rounded-3xl border-2 cursor-pointer transition-all duration-200 outline-none focus-visible:ring-2 focus-visible:ring-accent"
      aria-label="Seleccionar opción: Busco piso"
      [aria-pressed]="type() === 'looking_for_flat'"
    >
      <div
        class="w-12 h-12 rounded-2xl flex items-center justify-center text-xl mb-4"
        [class]="type() === 'looking_for_flat' ? 'bg-accent text-white' : 'bg-gray-50 text-primary'"
      >
        <i class="pi pi-search" aria-hidden="true"></i>
      </div>
      <h3 class="font-bold text-primary">Busco piso</h3>
      <p class="text-sm text-gray-500">Quiero unirme a un piso existente.</p>
    </div>

    <div
      role="button"
      tabindex="0"
      (click)="setType('looking_for_roommate')"
      (keydown.enter)="setType('looking_for_roommate')"
      (keydown.space)="setType('looking_for_roommate')"
      [class]="cardClasses(type() === 'looking_for_roommate')"
      class="relative p-6 rounded-3xl border-2 cursor-pointer transition-all duration-200 outline-none focus-visible:ring-2 focus-visible:ring-accent"
      aria-label="Seleccionar opción: Tengo piso"
      [aria-pressed]="type() === 'looking_for_roommate'"
    >
      <div
        class="w-12 h-12 rounded-2xl flex items-center justify-center text-xl mb-4"
        [class]="
          type() === 'looking_for_roommate' ? 'bg-accent text-white' : 'bg-gray-50 text-primary'
        "
      >
        <i class="pi pi-home" aria-hidden="true"></i>
      </div>
      <h3 class="font-bold text-primary">Tengo piso</h3>
      <p class="text-sm text-gray-500">Busco al compañero ideal.</p>
    </div>
  </div>

  @if (true) {
    <div class="space-y-4">
      <label
        for="budgetSlider"
        class="block text-xs font-semibold text-gray-500 uppercase tracking-wider"
      >
        {{ type() === 'looking_for_flat' ? 'Presupuesto máximo' : 'Precio de la habitación' }}
      </label>
      <div class="flex items-center gap-6">
        <p-slider
          inputId="budgetSlider"
          [ngModel]="budget()"
          (ngModelChange)="onBudgetChange($event)"
          [min]="200"
          [max]="1500"
          [step]="50"
          class="flex-1"
        />
        <span class="text-2xl font-serif text-primary" aria-live="polite">{{ budget() }}€</span>
      </div>
    </div>
  }
</div>
