@if (photo(); as p) {
  <div
    class="aspect-3/4 relative group/photo cursor-grab active:cursor-grabbing rounded-2xl overflow-hidden border border-gray-border bg-gray-50 shadow-sm hover:shadow-md transition-all duration-200 w-full h-full"
    [attr.aria-label]="'Foto ' + (index() + 1) + ', arrastra para reordenar'"
  >
    <img
      [src]="getPhotoUrl(p)"
      [alt]="'Foto de perfil ' + (index() + 1)"
      class="w-full h-full object-cover"
    />

    @if (index() === 0) {
      <div
        class="absolute bottom-0 inset-x-0 bg-primary/90 text-white text-[9px] font-bold py-2 text-center uppercase tracking-widest backdrop-blur-sm"
      >
        Principal
      </div>
    }

    <button
      type="button"
      (click)="handleDelete($event)"
      class="absolute top-2 right-2 bg-white/90 hover:bg-white text-gray-500 hover:text-red-500 w-8 h-8 rounded-full flex items-center justify-center shadow-lg transition-all duration-200 opacity-100 md:opacity-0 md:group-hover/photo:opacity-100 backdrop-blur-sm cursor-pointer z-10"
      aria-label="Eliminar esta foto"
    >
      <i class="pi pi-trash text-sm"></i>
    </button>
  </div>
} @else {
  <div
    class="aspect-3/4 border-2 border-dashed border-gray-200 rounded-2xl flex flex-col items-center justify-center gap-3 bg-gray-50/50 hover:bg-gray-50 hover:border-primary/30 transition-all duration-200 cursor-pointer group w-full h-full"
    (click)="handleAdd()"
    (keydown)="handleKeyDown($event)"
    tabindex="0"
  >
    <div
      class="w-10 h-10 rounded-full bg-white border border-gray-100 flex items-center justify-center text-primary shadow-sm transition-transform duration-200"
    >
      <i class="pi pi-plus font-bold"></i>
    </div>
    <span
      class="text-[11px] font-bold text-gray-400 uppercase tracking-wider group-hover:text-primary transition-colors"
      >Añadir</span
    >
  </div>
}
