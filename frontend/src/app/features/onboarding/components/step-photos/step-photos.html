<div>
  <div class="mb-10 text-center md:text-left">
    <h2 class="text-3xl font-bold text-primary mb-3">Añade tus fotos</h2>
  </div>

  <div
    cdkDropList
    #photoList="cdkDropList"
    [cdkDropListData]="photoSlots()"
    cdkDropListOrientation="mixed"
    class="grid grid-cols-2 md:grid-cols-3 gap-4"
    (cdkDropListDropped)="onPhotosReordered($event)"
  >
    @for (photo of photoSlots(); track $index) {
      <app-photo-card
        [photo]="photo"
        [index]="$index"
        (added)="openFileInput()"
        (deleted)="deletePhotoItem($event)"
        cdkDrag
        [cdkDragDisabled]="!photo"
        class="block w-full h-full"
      />
    }
  </div>

  <input
    #fileInputRef
    type="file"
    multiple
    accept=".jpg,.jpeg,.png,.webp,.gif,.heic,.heif,image/jpeg,image/png,image/webp,image/gif,image/heic,image/heif"
    class="hidden"
    (change)="onFileSelected($event)"
  />

  <div class="mt-8 flex flex-col items-center gap-3">
    <p
      class="text-[10px] font-bold text-gray-500 uppercase tracking-[0.2em] px-4 py-2 bg-gray-50/50 rounded-full border border-gray-100"
    >
      Formatos: JPG, PNG, WEBP, GIF, HEIC • Máx 10MB
    </p>

    @if (hasPhotos()) {
      <p
        class="text-[10px] font-bold text-primary uppercase tracking-[0.2em] px-4 py-2 bg-primary/5 rounded-full border border-primary/10"
      >
        {{ allPhotos().length }} de {{ MAX_PHOTOS }} fotos seleccionadas
      </p>
    }
  </div>

  @if (isLoading()) {
    <div
      class="mt-8 flex items-center justify-center gap-3 text-accent text-sm font-bold animate-pulse"
    >
      <i class="pi pi-spinner pi-spin"></i> Subiendo fotos...
    </div>
  }
</div>
