<div>
  <div class="mb-10 text-center md:text-left">
    <h2 class="text-3xl font-bold text-primary mb-3">Añade tus fotos</h2>
  </div>

  <div
    cdkDropList
    #photoList="cdkDropList"
    [cdkDropListData]="photoSlots()"
    cdkDropListOrientation="mixed"
    class="grid grid-cols-2 md:grid-cols-3 gap-4"
    (cdkDropListDropped)="onPhotosReordered($event)"
  >
    @for (photo of photoSlots(); track $index) {
      <app-photo-card
        [photo]="photo"
        [index]="$index"
        (added)="openFileInput()"
        (deleted)="deletePhotoItem($event)"
        cdkDrag
        [cdkDragDisabled]="!photo"
        class="block w-full h-full"
      />
    }
  </div>

  <input
    #fileInputRef
    type="file"
    multiple
    accept="image/jpeg,image/png,image/webp"
    class="hidden"
    (change)="onFileSelected($event)"
  />

  @if (hasPhotos()) {
    <div class="mt-6 flex justify-center">
      <p
        class="text-[10px] font-bold text-gray-400 uppercase tracking-[0.2em] bg-gray-50 px-4 py-2 rounded-full border border-gray-100"
      >
        {{ allPhotos().length }} de {{ MAX_PHOTOS }} fotos seleccionadas
      </p>
    </div>
  }

  @if (isLoading()) {
    <div
      class="mt-8 flex items-center justify-center gap-3 text-accent text-sm font-bold animate-pulse"
    >
      <i class="pi pi-spinner pi-spin"></i> Subiendo fotos...
    </div>
  }
</div>
