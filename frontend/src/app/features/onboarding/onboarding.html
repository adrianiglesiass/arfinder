<div class="min-h-screen bg-white">
  <div class="max-w-3xl mx-auto w-full pt-12 px-6 pb-16">
    <button
      type="button"
      class="text-gray-400 hover:text-primary text-sm flex items-center gap-2 mb-8 transition-colors cursor-pointer"
      (click)="router.navigate(['/auth'])"
    >
      <i class="pi pi-arrow-left"></i> Salir
    </button>

    <div class="mb-12">
      <div
        class="flex justify-between text-xs font-semibold text-gray-400 uppercase tracking-wider mb-3"
      >
        <span>Paso {{ currentStep() }} de {{ totalSteps }}</span>
        <span class="text-gray-400">{{ stepTitle() }}</span>
      </div>
      <div class="h-1.5 bg-gray-100 rounded-full overflow-hidden">
        <div
          class="h-full bg-primary transition-all duration-500 ease-out rounded-full"
          [style.width.%]="progress()"
        ></div>
      </div>
    </div>

    <div class="relative min-h-105">
      @switch (currentStep()) {
        @case (1) {
          <app-step-profile
            [name]="safeForm().name"
            [age]="safeForm().age"
            [city]="safeForm().city"
            [bio]="safeForm().bio"
            (changed)="updateForm($event)"
          />
        }

        @case (2) {
          <app-step-objective
            [type]="form().type!"
            [budget]="safeForm().max_budget"
            (dataChange)="updateForm($event)"
          />
        }

        @case (3) {
          <app-step-lifestyle
            [schedule]="form().schedule!"
            [hasPets]="safeForm().has_pets"
            [isSmoker]="safeForm().is_smoker"
            (dataChange)="updateForm($event)"
          />
        }

        @case (4) {
          <app-step-photos />
        }
      }
    </div>

    <div class="mt-12 flex justify-between items-center pt-6 border-t border-gray-100">
      <button
        type="button"
        class="text-gray-500 font-medium text-sm hover:text-primary transition-colors cursor-pointer"
        [class.invisible]="isFirstStep()"
        (click)="prevStep()"
      >
        Atrás
      </button>

      <button
        type="button"
        class="bg-primary text-white cursor-pointer px-8 py-3 rounded-2xl font-medium text-sm hover:shadow-lg hover:shadow-primary/30 active:brightness-90 transition-all duration-200"
        (click)="nextStep()"
      >
        {{ submitLabel() }}
      </button>
    </div>
  </div>
</div>
