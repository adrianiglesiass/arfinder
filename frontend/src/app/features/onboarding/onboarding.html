@if (isReady()) {
  <div class="min-h-screen bg-white">
    <div class="max-w-3xl mx-auto w-full pt-12 px-6 pb-16">
      <div class="mb-10">
        <div class="flex justify-end mb-3">
          <button
            type="button"
            (click)="openExitConfirm()"
            [disabled]="isExiting()"
            class="inline-flex items-center gap-1.5 px-3 py-1.5 rounded-full text-[12px] font-bold text-red-500 hover:bg-red-50 active:scale-[0.98] transition-all cursor-pointer disabled:opacity-60 disabled:cursor-not-allowed"
          >
            <i class="pi pi-sign-out text-xs"></i>
            Salir
          </button>
        </div>
        <div class="flex justify-between items-end mb-4">
          <div>
            <span
              class="text-[10px] font-bold text-gray-400 uppercase tracking-[0.2em] mb-1.5 block"
              >Paso {{ currentStep() }} de {{ totalSteps }}</span
            >
            <h1 class="text-3xl font-bold text-primary">{{ stepTitle() }}</h1>
          </div>
          <span class="text-[11px] font-bold text-gray-500 tracking-widest"
            >{{ progress() | number: '1.0-0' }}%</span
          >
        </div>
        <div class="h-1 bg-gray-100 rounded-full overflow-hidden">
          <div
            class="h-full bg-primary transition-all duration-700 ease-apple rounded-full"
            [style.width.%]="progress()"
          ></div>
        </div>
      </div>

      <div class="relative pt-4">
        <div
          #stepHost
          class="relative w-full h-full transition-[height] duration-700 ease-apple"
          [class.overflow-hidden]="lockedHeight() !== null"
          [style.height.px]="lockedHeight()"
        >
          @switch (currentStep()) {
            @case (1) {
              <div
                class="w-full"
                [animate.enter]="direction() === 'forward' ? 'slide-in-right' : 'slide-in-left'"
                [animate.leave]="
                  direction() === 'forward'
                    ? 'slide-out-left animating-step'
                    : 'slide-out-right animating-step'
                "
              >
                <app-step-profile
                  [name]="safeForm().name"
                  [age]="safeForm().age ?? 0"
                  [city]="safeForm().city"
                  [bio]="safeForm().bio"
                  [gender]="safeForm().gender"
                  [availableFrom]="safeForm().available_from"
                  [showErrors]="showErrors()"
                  (changed)="updateForm($event)"
                />
              </div>
            }

            @case (2) {
              <div
                class="w-full"
                [animate.enter]="direction() === 'forward' ? 'slide-in-right' : 'slide-in-left'"
                [animate.leave]="
                  direction() === 'forward'
                    ? 'slide-out-left animating-step'
                    : 'slide-out-right animating-step'
                "
              >
                <app-step-objective
                  [type]="form().type!"
                  [budget]="safeForm().max_budget"
                  [roomDescription]="safeForm().room_description"
                  (dataChange)="updateForm($event)"
                />
              </div>
            }

            @case (3) {
              <div
                class="w-full"
                [animate.enter]="direction() === 'forward' ? 'slide-in-right' : 'slide-in-left'"
                [animate.leave]="
                  direction() === 'forward'
                    ? 'slide-out-left animating-step'
                    : 'slide-out-right animating-step'
                "
              >
                <app-step-lifestyle
                  [schedule]="form().schedule!"
                  [hasPets]="safeForm().has_pets"
                  [isSmoker]="safeForm().is_smoker"
                  (dataChange)="updateForm($event)"
                />
              </div>
            }

            @case (4) {
              <div
                class="w-full"
                [animate.enter]="direction() === 'forward' ? 'slide-in-right' : 'slide-in-left'"
                [animate.leave]="
                  direction() === 'forward'
                    ? 'slide-out-left animating-step'
                    : 'slide-out-right animating-step'
                "
              >
                <app-step-photos />
              </div>
            }
          }
        </div>
      </div>

      <div class="mt-12 flex justify-between items-center pt-8 border-t border-gray-border">
        <app-button
          variant="ghost"
          size="sm"
          [class.invisible]="isFirstStep()"
          (click)="prevStep()"
        >
          Anterior
        </app-button>

        <app-button (click)="nextStep()">
          {{ submitLabel() }}
        </app-button>
      </div>
    </div>
  </div>
} @else {
  <div class="min-h-screen flex items-center justify-center">
    <div class="text-center">
      <i class="pi pi-spin pi-spinner text-4xl text-primary"></i>
      <div class="mt-4">Cargando...</div>
    </div>
  </div>
}

@if (showExitConfirm()) {
  <app-confirm-destructive-dialog
    title="¿Cancelar registro?"
    description="Si sales ahora, tu cuenta y todos los datos asociados se eliminarán. Tendrás que volver a registrarte si cambias de opinión."
    confirmLabel="Sí, cancelar"
    [isDeleting]="isExiting()"
    (dismissed)="dismissExit()"
    (confirmed)="confirmExit()"
  />
}

<p-toast />
