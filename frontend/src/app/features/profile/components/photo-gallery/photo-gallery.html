<div
  class="relative w-full bg-gray-100 overflow-hidden rounded-3xl group aspect-4/5 sm:aspect-3/4 md:aspect-auto md:h-[calc(100svh-7rem)] md:sticky md:top-4"
  (touchstart)="onTouchStart($event)"
  (touchend)="onTouchEnd($event)"
>
  @if (hasPhotos()) {
    @for (photo of photos(); track photo.id; let i = $index) {
      <img
        [ngSrc]="photo.photo_url"
        fill
        sizes="(max-width: 768px) 100vw, 50vw"
        [priority]="i === 0"
        [alt]="name() + ' foto ' + (i + 1)"
        class="absolute inset-0 w-full h-full object-cover transition-opacity duration-300"
        [class.opacity-100]="i === activeIndex()"
        [class.opacity-0]="i !== activeIndex()"
        [attr.aria-hidden]="i !== activeIndex()"
      />
    }

    @if (hasMultiple()) {
      <div class="absolute top-0 inset-x-0 flex gap-1 p-3 z-10">
        @for (photo of photos(); track photo.id; let i = $index) {
          <button
            type="button"
            (click)="onGoTo(i, $event)"
            [attr.aria-label]="'Ir a foto ' + (i + 1)"
            class="flex-1 h-0.5 transition-colors cursor-pointer"
            [class]="i === activeIndex() ? 'bg-white' : 'bg-white/35'"
          ></button>
        }
      </div>

      <button
        type="button"
        (click)="onPrev($event)"
        aria-label="Foto anterior"
        class="absolute left-3 top-1/2 -translate-y-1/2 w-10 h-10 flex items-center justify-center rounded-full bg-black/30 hover:bg-black/45 text-white focus-visible:outline-none transition-all cursor-pointer z-10"
      >
        <i class="pi pi-chevron-left text-sm"></i>
      </button>
      <button
        type="button"
        (click)="onNext($event)"
        aria-label="Foto siguiente"
        class="absolute right-3 top-1/2 -translate-y-1/2 w-10 h-10 flex items-center justify-center rounded-full bg-black/30 hover:bg-black/45 text-white focus-visible:outline-none transition-all cursor-pointer z-10"
      >
        <i class="pi pi-chevron-right text-sm"></i>
      </button>
    }
  } @else {
    <div class="w-full h-full flex items-center justify-center text-gray-300">
      <span class="material-symbols-rounded text-8xl">person</span>
    </div>
  }

  <span
    class="absolute bottom-4 left-4 px-3 py-1.5 bg-white text-[11px] font-bold uppercase tracking-[0.18em] text-primary z-10"
  >
    {{ typeLabel() }}
  </span>
</div>
