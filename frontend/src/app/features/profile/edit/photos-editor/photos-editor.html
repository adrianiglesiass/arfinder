<div>
  <div
    cdkDropList
    cdkDropListOrientation="mixed"
    class="grid grid-cols-2 md:grid-cols-3 gap-4"
    (cdkDropListDropped)="onReordered($event)"
  >
    @for (photo of photoSlots(); track $index) {
      <app-photo-card
        [photo]="photo"
        [index]="$index"
        (added)="openFileInput()"
        (deleted)="onPhotoDeleted($event)"
        cdkDrag
        [cdkDragDisabled]="!photo || busy()"
        class="block w-full h-full"
      />
    }
  </div>

  <input
    #fileInputRef
    type="file"
    multiple
    accept=".jpg,.jpeg,.png,.webp,.gif,.heic,.heif,image/jpeg,image/png,image/webp,image/gif,image/heic,image/heif"
    class="hidden"
    (change)="onFileSelected($event)"
  />

  <div class="mt-6 flex flex-col items-center gap-2">
    <p
      class="text-[10px] font-bold text-gray-500 uppercase tracking-[0.2em] px-4 py-2 bg-gray-50/60 rounded-full border border-gray-100"
    >
      Arrastra para reordenar · La primera será tu foto principal
    </p>
    <p class="text-[10px] font-bold text-gray-400 uppercase tracking-[0.2em]">
      JPG, PNG, WEBP, GIF o HEIC · Máx 10MB
    </p>
    @if (busy()) {
      <span class="inline-flex items-center gap-2 text-accent text-xs font-bold mt-1">
        <i class="pi pi-spinner pi-spin"></i> Sincronizando...
      </span>
    }
  </div>
</div>
