<div class="min-h-screen bg-gray-50/40">
  @if (isLoading()) {
    <div
      class="w-full max-w-7xl mx-auto px-4 md:px-6 py-4 md:py-5"
      aria-busy="true"
      aria-live="polite"
    >
      <app-skeleton shape="bar" size="h-8 w-40 mb-4" />
      <div
        class="grid grid-cols-1 md:grid-cols-[minmax(0,1.1fr)_minmax(0,1fr)] gap-6 lg:gap-8 items-start"
      >
        <app-skeleton
          shape="rect"
          size="w-full aspect-4/5 sm:aspect-3/4 md:aspect-auto md:h-[calc(100svh-7rem)]"
        />
        <div class="bg-white border border-gray-border rounded-2xl p-5 md:p-6">
          <app-skeleton shape="rect" size="h-8 w-2/3" />
          <app-skeleton shape="rect" size="h-4 w-1/3 mt-3" />
          <app-skeleton shape="bar" size="h-10 w-40 mt-5" />
          <app-skeleton shape="rect" size="h-14 w-full mt-7" />
          <div class="flex flex-wrap gap-2 mt-7">
            <app-skeleton shape="bar" size="h-8 w-24" />
            <app-skeleton shape="bar" size="h-8 w-28" />
            <app-skeleton shape="bar" size="h-8 w-20" />
          </div>
          <div class="mt-8 pt-8 border-t border-gray-100 space-y-2">
            <app-skeleton shape="rect" size="h-3 w-20" />
            <app-skeleton shape="rect" size="h-4 w-full" />
            <app-skeleton shape="rect" size="h-4 w-5/6" />
            <app-skeleton shape="rect" size="h-4 w-3/4" />
          </div>
        </div>
      </div>
      <span class="sr-only">Cargando perfil...</span>
    </div>
  } @else if (error()) {
    <div class="flex flex-col items-center justify-center min-h-[60vh] gap-4 px-4 text-center">
      <span class="material-symbols-rounded text-6xl text-gray-300">person_off</span>
      <p class="text-gray-500 font-medium">{{ error() }}</p>
      <a
        [routerLink]="exploreRoute"
        class="inline-flex items-center gap-2 text-primary font-semibold hover:underline"
      >
        <i class="pi pi-arrow-left text-sm"></i>
        Volver a explorar
      </a>
    </div>
  } @else if (profile(); as p) {
    <div class="w-full max-w-7xl mx-auto px-4 md:px-6 py-4 md:py-5 pb-32 md:pb-8">
      <a
        [routerLink]="exploreRoute"
        class="inline-flex items-center gap-2 px-3 py-1.5 -ml-3 rounded-full text-gray-600 hover:text-primary hover:bg-white active:bg-gray-100 active:text-primary active:scale-[0.97] mb-4 transition-all"
      >
        <i class="pi pi-arrow-left text-sm"></i>
        <span class="font-medium text-sm">Volver a explorar</span>
      </a>

      <div
        class="grid grid-cols-1 md:grid-cols-[minmax(0,1.1fr)_minmax(0,1fr)] gap-6 lg:gap-8 items-start"
      >
        <app-photo-gallery
          [photos]="photos()"
          [activeIndex]="activePhotoIndex()"
          [name]="p.name"
          [type]="p.type"
          (prev)="prevPhoto($event)"
          (next)="nextPhoto($event)"
          (goTo)="goToPhoto($event.index, $event.event)"
          (touchStart)="onTouchStart($event)"
          (touchEnd)="onTouchEnd($event)"
        />

        <app-profile-info-block
          [profile]="p"
          [showSendMessageButton]="showSendMessageButton()"
          [sendingMessage]="sendingMessage()"
          (sendMessage)="sendMessage()"
        />
      </div>
    </div>

    @if (showSendMessageButton()) {
      <div class="md:hidden fixed bottom-24 left-4 right-4 z-40">
        <div
          class="bg-white border border-gray-border rounded-full shadow-lg p-1.5 pl-4 flex items-center justify-between gap-3"
        >
          <span class="text-sm font-semibold text-primary truncate">
            ¿Te encaja {{ p.name }}?
          </span>
          <app-button
            size="sm"
            (click)="sendMessage()"
            [loading]="sendingMessage()"
            [disabled]="sendingMessage()"
          >
            <i class="pi pi-send text-xs"></i>
            Mensaje
          </app-button>
        </div>
      </div>
    }
  }
</div>
