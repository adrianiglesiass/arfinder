<section class="w-full px-5 md:px-6 xl:px-8 pt-6 pb-16">
  <header class="mb-5 flex items-end justify-between gap-3">
    <div class="min-w-0">
      <h1 class="text-xl md:text-2xl font-bold text-primary leading-tight">Explora compañeros</h1>
      <p class="text-sm text-gray-500 font-medium mt-1" aria-live="polite">
        @if (isLoading()) {
          Buscando perfiles...
        } @else if (resultsLabel()) {
          {{ resultsLabel() }}
        }
      </p>
    </div>

    <div class="lg:hidden shrink-0">
      <button
        type="button"
        (click)="toggleFilters()"
        class="relative inline-flex items-center gap-2 h-10 px-4 rounded-full bg-primary text-white text-[12px] font-bold transition-all active:scale-[0.97] cursor-pointer"
      >
        <i class="pi pi-sliders-h text-[12px]"></i>
        Filtros
        @if (activeFilterCount()) {
          <span
            class="ml-1 inline-flex items-center justify-center min-w-5 h-5 px-1.5 rounded-full bg-white text-primary text-[10px] font-bold tabular-nums"
          >
            {{ activeFilterCount() }}
          </span>
        }
      </button>
    </div>
  </header>

  @if (activeChips().length) {
    <div class="flex flex-wrap items-center gap-2 mb-5" role="region" aria-label="Filtros activos">
      @for (chip of activeChips(); track chip.key) {
        <button
          type="button"
          (click)="removeFilter(chip.key)"
          class="inline-flex items-center gap-1.5 h-8 pl-3 pr-2 bg-primary text-white rounded-full text-[12px] font-semibold cursor-pointer transition-all active:scale-[0.97]"
          [attr.aria-label]="'Quitar filtro ' + chip.label"
        >
          <span>{{ chip.label }}</span>
          <span class="inline-flex items-center justify-center w-5 h-5 rounded-full bg-white/20">
            <i class="pi pi-times text-[9px]"></i>
          </span>
        </button>
      }
    </div>
  }

  <app-search-results />

  @if (filtersOpen()) {
    <div class="lg:hidden fixed inset-0 z-50 animate-fade-in">
      <button
        type="button"
        (click)="closeFilters()"
        (keyup.escape)="closeFilters()"
        aria-label="Cerrar filtros"
        class="absolute inset-0 bg-black/40 backdrop-blur-sm cursor-default"
      ></button>

      <div
        role="dialog"
        aria-modal="true"
        aria-label="Filtros"
        class="absolute bottom-0 inset-x-0 max-h-[90vh] flex flex-col bg-white rounded-t-3xl shadow-(--shadow-glass)"
        [class.transition-transform]="!isDragging()"
        [class.duration-300]="!isDragging()"
        [style.transform]="'translateY(' + dragY() + 'px)'"
      >
        <div class="shrink-0 relative">
          <div
            class="py-3 flex justify-center touch-none cursor-grab active:cursor-grabbing"
            (touchstart)="onDragStart($event)"
            (touchmove)="onDragMove($event)"
            (touchend)="onDragEnd()"
            (touchcancel)="onDragEnd()"
            aria-hidden="true"
          >
            <div class="w-10 h-1 rounded-full bg-gray-300"></div>
          </div>
          <button
            type="button"
            (click)="closeFilters()"
            class="absolute top-2 right-4 w-9 h-9 flex items-center justify-center rounded-full bg-gray-50 text-gray-500 cursor-pointer"
            aria-label="Cerrar"
          >
            <i class="pi pi-times text-[13px]"></i>
          </button>
        </div>

        <div class="flex-1 min-h-0 overflow-y-auto overscroll-contain">
          <app-search-filters />
        </div>

        <div class="shrink-0 p-4 border-t border-gray-100">
          <app-button class="w-full" (click)="closeFilters()">Ver resultados</app-button>
        </div>
      </div>
    </div>
  }
</section>

<ng-template #filtersTpl>
  <app-search-filters />
</ng-template>
