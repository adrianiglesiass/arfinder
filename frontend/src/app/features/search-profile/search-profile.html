<section class="w-full px-5 md:px-6 xl:px-8 pt-6 pb-16">
  <div class="lg:hidden mb-6">
    <app-button size="sm" (click)="toggleFilters()">
      <i class="pi pi-sliders-h text-[12px]"></i>
      Filtros
    </app-button>
  </div>

  <app-search-results />

  @if (filtersOpen()) {
    <div class="lg:hidden fixed inset-0 z-50 animate-fade-in">
      <button
        type="button"
        (click)="closeFilters()"
        (keyup.escape)="closeFilters()"
        aria-label="Cerrar filtros"
        class="absolute inset-0 bg-black/40 backdrop-blur-sm cursor-default"
      ></button>

      <div
        role="dialog"
        aria-modal="true"
        aria-label="Filtros"
        class="absolute bottom-0 inset-x-0 max-h-[90vh] flex flex-col bg-white rounded-t-3xl shadow-(--shadow-glass)"
        [class.transition-transform]="!isDragging()"
        [class.duration-300]="!isDragging()"
        [style.transform]="'translateY(' + dragY() + 'px)'"
      >
        <div class="shrink-0 relative">
          <div
            class="py-3 flex justify-center touch-none cursor-grab active:cursor-grabbing"
            (touchstart)="onDragStart($event)"
            (touchmove)="onDragMove($event)"
            (touchend)="onDragEnd()"
            (touchcancel)="onDragEnd()"
            aria-hidden="true"
          >
            <div class="w-10 h-1 rounded-full bg-gray-300"></div>
          </div>
          <button
            type="button"
            (click)="closeFilters()"
            class="absolute top-2 right-4 w-9 h-9 flex items-center justify-center rounded-full bg-gray-50 text-gray-500 cursor-pointer"
            aria-label="Cerrar"
          >
            <i class="pi pi-times text-[13px]"></i>
          </button>
        </div>

        <div class="flex-1 min-h-0 overflow-y-auto overscroll-contain">
          <app-search-filters />
        </div>

        <div class="shrink-0 p-4 border-t border-gray-100">
          <app-button class="w-full" (click)="closeFilters()">Ver resultados</app-button>
        </div>
      </div>
    </div>
  }
</section>

<ng-template #filtersTpl>
  <app-search-filters />
</ng-template>
