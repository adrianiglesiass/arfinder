<nav
  class="fixed bottom-6 left-6 right-6 z-50 md:hidden glass-nav rounded-3xl mx-auto max-w-md overflow-hidden shadow-2xl"
>
  <div class="flex justify-around items-center h-16 w-full">
    @for (item of navItems; track item.link) {
      <a
        [routerLink]="item.link"
        routerLinkActive
        #rla="routerLinkActive"
        class="flex flex-col items-center justify-center gap-1 no-underline transition-all duration-200 min-w-17.5"
        [class]="rla.isActive ? 'text-primary scale-110' : 'text-gray-500'"
      >
        <div class="h-8 flex items-center justify-center relative">
          <i [class]="item.icon + ' text-xl'"></i>
          @if (item.badge?.(); as badge) {
            <app-nav-badge>{{ badge }}</app-nav-badge>
          }
        </div>
        <span class="text-[10px] font-semibold leading-none">{{ item.label }}</span>
      </a>
    }

    <div
      class="flex flex-col items-center justify-center gap-1 transition-all duration-200 min-w-17.5"
    >
      <app-navbar-user-menu />
      <span class="text-[10px] font-semibold leading-none text-gray-500">{{ profileLabel() }}</span>
    </div>
  </div>
</nav>
