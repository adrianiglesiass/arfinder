<div
  [class]="sizeClass()"
  class="relative rounded-full overflow-hidden bg-gray-100 flex items-center justify-center shrink-0"
>
  @if (src(); as source) {
    @if (priority()) {
      <img [ngSrc]="source" fill priority [alt]="alt()" class="w-full h-full object-cover" />
    } @else {
      <img [ngSrc]="source" fill [alt]="alt()" class="w-full h-full object-cover" />
    }
  } @else {
    <span [class]="iconSizeClass()" class="material-symbols-rounded text-gray-400">person</span>
  }
</div>
