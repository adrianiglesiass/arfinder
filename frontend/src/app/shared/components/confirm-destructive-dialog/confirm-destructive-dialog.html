<div class="fixed inset-0 z-50 flex items-center justify-center px-4 animate-fade-in">
  <button
    type="button"
    (click)="onCancel()"
    (keyup.escape)="onCancel()"
    aria-label="Cerrar"
    class="absolute inset-0 bg-black/40 backdrop-blur-sm cursor-default"
  ></button>

  <div
    role="dialog"
    aria-modal="true"
    aria-labelledby="delete-dialog-title"
    class="relative w-full max-w-md bg-white rounded-3xl shadow-(--shadow-glass) p-6 md:p-7"
  >
    <div
      class="w-12 h-12 rounded-full bg-red-50 flex items-center justify-center text-red-500 mb-4"
    >
      <i class="pi pi-exclamation-triangle text-lg"></i>
    </div>
    <h3 id="delete-dialog-title" class="text-lg md:text-xl font-bold text-primary leading-tight">
      {{ title() }}
    </h3>
    <p class="text-xs md:text-sm text-gray-500 font-medium mt-2">{{ description() }}</p>

    <div class="mt-6 flex items-center justify-end gap-2">
      <app-button variant="ghost" size="sm" (click)="onCancel()" [disabled]="isDeleting()">
        Cancelar
      </app-button>
      <app-button
        variant="danger"
        size="sm"
        (click)="onConfirm()"
        [disabled]="isDeleting()"
        [loading]="isDeleting()"
      >
        <i class="pi pi-trash text-xs"></i>
        {{ confirmLabel() }}
      </app-button>
    </div>
  </div>
</div>
