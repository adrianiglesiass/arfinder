<nav
  class="fixed bottom-0 left-0 right-0 z-50 md:hidden glass-nav border-t border-t-[#00000018] pb-1"
>
  <div class="flex justify-around items-center h-16 w-full">
    @for (item of navItems; track item.link) {
      <a
        [routerLink]="item.link"
        routerLinkActive
        #rla="routerLinkActive"
        class="flex flex-col items-center justify-center gap-1 no-underline transition-all duration-200 min-w-17.5"
        [ngClass]="rla.isActive ? 'text-primary scale-110' : 'text-gray-400'"
      >
        <div class="h-8 flex items-center justify-center relative">
          <i [class]="item.icon + ' text-xl'"></i>
          @if (item.label === 'Mensajes') {
            <span
              class="absolute -top-0.5 -right-1.5 bg-red-500 text-white text-[8px] min-w-3.5 h-3.5 px-0.5 rounded-full flex items-center justify-center font-bold border border-white shadow-sm"
            >
              9+
            </span>
          }
        </div>
        <span class="text-[10px] font-medium leading-none">{{ item.label }}</span>
      </a>
    }

    <a
      routerLink="/profile"
      routerLinkActive
      #rlaProfile="routerLinkActive"
      class="flex flex-col items-center justify-center gap-1 no-underline transition-all duration-200 min-w-17.5"
      [ngClass]="{ 'scale-110': rlaProfile.isActive }"
    >
      <div class="h-8 flex items-center justify-center">
        <div
          class="w-8 h-8 rounded-full overflow-hidden border"
          [ngClass]="
            rlaProfile.isActive
              ? 'border-primary ring-2 ring-primary/20'
              : 'border-gray-200 shadow-sm'
          "
        >
          <img [src]="avatarUrl()" alt="Perfil" class="w-full h-full object-cover" />
        </div>
      </div>
      <span
        class="text-[10px] font-medium leading-none"
        [ngClass]="rlaProfile.isActive ? 'text-primary' : 'text-gray-400'"
      >
        Perfil
      </span>
    </a>
  </div>
</nav>
