@if (isLoggedIn()) {
  <div class="relative inline-block">
    <p-menu #userMenu [model]="items" [popup]="true" appendTo="body" styleClass="w-48 " />
    <button
      type="button"
      class="w-11 h-11 rounded-full overflow-hidden cursor-pointer border border-gray-200 shadow-sm hover:shadow-md transition-shadow focus:outline-none"
      (click)="userMenu.toggle($event)"
      aria-label="Abrir menú de usuario"
    >
      @if (avatarUrl()) {
        <img [src]="avatarUrl()" alt="Avatar" class="w-full h-full object-cover" />
      } @else {
        <div class="w-full h-full flex items-center justify-center bg-zinc-100 text-zinc-400">
          <i class="pi pi-user text-xl"></i>
        </div>
      }
    </button>
  </div>
} @else {
  <a
    routerLink="/login"
    class="w-11 h-11 rounded-full flex items-center justify-center cursor-pointer border border-gray-200 shadow-sm hover:shadow-md transition-shadow text-zinc-500 no-underline"
    aria-label="Iniciar sesión"
  >
    <i class="pi pi-sign-in text-xl"></i>
  </a>
}
