<div
  class="w-11 h-11 rounded-full overflow-hidden cursor-pointer border border-gray-200 shadow-sm hover:shadow-md transition-shadow"
  routerLink="/profile"
>
  @if (avatarUrl()) {
    <img [src]="avatarUrl()" alt="Avatar" class="w-full h-full object-cover" />
  } @else {
    <div class="w-full h-full flex items-center justify-center bg-zinc-100 text-zinc-400">
      <i class="pi pi-user text-xl"></i>
    </div>
  }
</div>
